name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore maintenance.keystore \
            -alias maintenance \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass maintenance123 \
            -keypass maintenance123 \
            -dname "CN=Maintenance, OU=Dev, O=Revolon, L=Tunis, ST=Tunis, C=TN"

      - name: Align APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign -v -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            maintenance-aligned.apk

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks maintenance.keystore \
            --ks-key-alias maintenance \
            --ks-pass pass:maintenance123 \
            --key-pass pass:maintenance123 \
            --out maintenance.apk \
            maintenance-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-apk
          path: maintenance.apk
